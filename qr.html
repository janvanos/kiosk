<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>USB Barcode / QR Scanner Demo</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    text-align: center;
    padding: 40px;
  }

  h1 {
    margin-bottom: 10px;
  }

  #scanInput {
    font-size: 20px;
    padding: 10px;
    width: 350px;
    text-align: center;
  }

  #status {
    margin-top: 15px;
    font-weight: bold;
    color: green;
  }

  #history {
    margin-top: 30px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  .item {
    padding: 8px;
    border-bottom: 1px solid #ddd;
  }

  .time {
    color: #888;
    font-size: 12px;
  }
</style>
</head>

<body>

<h1>USB Barcode / QR Scanner Demo</h1>
<p>Scan een barcode of QR-code</p>

<input 
  type="text" 
  id="scanInput" 
  autofocus 
  placeholder="Wacht op scan..."
/>

<div id="status"></div>

<div id="history">
  <strong>Scan Geschiedenis:</strong>
  <div id="list"></div>
</div>

<script>
const input = document.getElementById("scanInput");
const statusDiv = document.getElementById("status");
const listDiv = document.getElementById("list");

input.focus();

// Zorg dat focus altijd terugkomt (magazijn-proof)
document.addEventListener("click", () => input.focus());

input.addEventListener("keydown", function(event) {

  if (event.key === "Enter") {

    const value = input.value.trim();
    if (!value) return;

    handleScan(value);
    input.value = "";
  }
});

function handleScan(data) {

  console.log("Gescand:", data);

  statusDiv.textContent = "✔ Laatste scan: " + data;
  statusDiv.style.color = "green";

  const time = new Date().toLocaleTimeString();

  const item = document.createElement("div");
  item.className = "item";
  item.innerHTML = `
    <strong>${data}</strong><br>
    <span class="time">${time}</span>
  `;

  listDiv.prepend(item);

  // Voorbeeld validatie
  if (data.startsWith("http")) {
    statusDiv.textContent += " (URL gedetecteerd)";
  } else if (!isNaN(data)) {
    statusDiv.textContent += " (Numerieke code)";
  }
}
</script>

</body>
</html>
