<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>USB Bonprinter</title>
<style>
    body {
        font-family: monospace;
        background: #f0f0f0;
        text-align: center;
        padding: 40px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #333;
    }
</style>
</head>
<body>

<h1>Fastfood Bon Printen</h1>
<button onclick="printReceipt()">Print Bonnetje</button>

<script>
async function printReceipt() {
    try {
        const device = await navigator.usb.requestDevice({
            filters: [{ vendorId: 0x0483 }] // Pas aan naar jouw printer vendorId
        });

        await device.open();
        await device.selectConfiguration(1);
        await device.claimInterface(0);

        const encoder = new TextEncoder();

        const receipt =
            "\x1B\x40" +                     // Initialize printer
            "BURGER EXPRESS\n" +
            "Hoofdstraat 12\n" +
            "Amsterdam\n" +
            "------------------------------\n" +
            "1x Cheeseburger     3.50\n" +
            "1x Grote Friet      2.80\n" +
            "1x Cola 0.5L        2.40\n" +
            "------------------------------\n" +
            "TOTAAL:             9.48\n\n" +
            "Bedankt voor uw bezoek!\n\n\n" +
            "" +
            "\x1D\x56\x01";                  // Feed line

            "\x1D\x56\x01";                  // Feed line
            "\x1D\x56\x01";                  // Feed line
            "\x1D\x56\x01";                  // Feed line
            "\x1D\x56\x01";                  // Feed line
            "\x1D\x56\x01";                  // Feed line
            "\x1D\x56\x00";                  // Cut paper

        await device.transferOut(1, encoder.encode(receipt));

        alert("Bonnetje geprint!");
    } catch (error) {
        console.error(error);
        alert("Printer niet gevonden of toegang geweigerd.");
    }
}

printReceipt();
</script>

</body>
</html>
